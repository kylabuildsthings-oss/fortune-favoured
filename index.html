<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fortune Favoured</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #3d2914;
      --bg-mid: #8b5e34;
      --bg-light: #d4a574;
      --gold: #e8b84a;
      --gold-bright: #f5d078;
      --cookie: #c47a3a;
      --cookie-dark: #8a4e1f;
      --cookie-light: #e09a55;
      --brown: #2a1a0c;
      --paper: #f7ecd4;
      --paper-edge: #e5d4b0;
      --ink: #3a2a1a;
      --muted: #6b5340;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100dvh;
      font-family: "Nunito", sans-serif;
      color: var(--brown);
      background:
        radial-gradient(ellipse 80% 60% at 50% 20%, rgba(245, 208, 120, 0.35), transparent 55%),
        radial-gradient(ellipse 70% 50% at 80% 80%, rgba(196, 122, 58, 0.4), transparent 50%),
        linear-gradient(165deg, var(--bg-light) 0%, var(--bg-mid) 45%, var(--bg-deep) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem 3rem;
    }

    .stage {
      width: min(420px, 100%);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .brand {
      font-family: "Fraunces", serif;
      font-size: clamp(2.4rem, 8vw, 3.25rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--brown);
      text-shadow: 0 2px 0 rgba(245, 208, 120, 0.45);
      line-height: 1.1;
    }

    .tagline {
      margin-top: -0.75rem;
      font-size: 1rem;
      font-weight: 600;
      color: var(--muted);
    }

    .cookie-wrap {
      position: relative;
      width: 220px;
      height: 160px;
      margin: 0.5rem 0;
      perspective: 600px;
    }

    .cookie {
      position: relative;
      width: 100%;
      height: 100%;
      transform-origin: center center;
      transition: transform 0.15s ease;
    }

    .cookie-svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
      filter: drop-shadow(0 10px 12px rgba(42, 26, 12, 0.28));
    }

    .cookie.shake {
      animation: shake 0.45s ease;
    }

    @keyframes shake {
      0%, 100% { transform: rotate(0deg) translateX(0); }
      20% { transform: rotate(-6deg) translateX(-4px); }
      40% { transform: rotate(6deg) translateX(4px); }
      60% { transform: rotate(-4deg) translateX(-2px); }
      80% { transform: rotate(3deg) translateX(2px); }
    }

    .cookie-state {
      transform-box: fill-box;
      transform-origin: center;
      transition:
        opacity 0.35s ease,
        transform 0.55s cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    .cookie-intact {
      opacity: 1;
      transform: scale(1);
    }

    .cookie-broken {
      opacity: 0;
      transform: scale(0.9);
    }

    .broken-left,
    .broken-right,
    .paper-emerging {
      transform-box: fill-box;
      transform-origin: center;
      transition: transform 0.6s cubic-bezier(0.34, 1.35, 0.64, 1);
    }

    .broken-left {
      transform: translateX(18px) rotate(7deg);
    }

    .broken-right {
      transform: translateX(-18px) rotate(-7deg);
    }

    .paper-emerging {
      transform: translateY(12px) scaleX(0.7);
    }

    .cookie.cracked .cookie-intact {
      opacity: 0;
      transform: scale(0.82) rotate(-2deg);
    }

    .cookie.cracked .cookie-broken {
      opacity: 1;
      transform: scale(1);
    }

    .cookie.cracked .broken-left {
      transform: translateX(-5px) rotate(-5deg);
    }

    .cookie.cracked .broken-right {
      transform: translateX(5px) rotate(5deg);
    }

    .cookie.cracked .paper-emerging {
      transform: translateY(0) scaleX(1);
    }

    .btn {
      font-family: "Nunito", sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--brown);
      background: linear-gradient(180deg, var(--gold-bright) 0%, var(--gold) 100%);
      border: none;
      border-radius: 999px;
      padding: 0.85rem 1.75rem;
      cursor: pointer;
      box-shadow:
        0 4px 0 #b8862a,
        0 8px 20px rgba(42, 26, 12, 0.25);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow:
        0 6px 0 #b8862a,
        0 12px 24px rgba(42, 26, 12, 0.28);
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow:
        0 2px 0 #b8862a,
        0 4px 12px rgba(42, 26, 12, 0.22);
    }

    .fortune-area {
      width: 100%;
      min-height: 7.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .fortune-slip {
      width: 100%;
      max-width: 380px;
      padding: 1.25rem 1.5rem;
      background:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 11px,
          rgba(180, 150, 100, 0.06) 11px,
          rgba(180, 150, 100, 0.06) 12px
        ),
        linear-gradient(135deg, #fff8e8 0%, var(--paper) 50%, var(--paper-edge) 100%);
      border: 1px solid rgba(139, 94, 52, 0.2);
      box-shadow:
        2px 3px 0 rgba(139, 94, 52, 0.08),
        0 10px 28px rgba(42, 26, 12, 0.2);
      transform: rotate(-1.5deg) scale(0.92);
      opacity: 0;
      visibility: hidden;
      transition:
        opacity 0.45s ease 0.15s,
        transform 0.45s cubic-bezier(0.34, 1.2, 0.64, 1) 0.15s,
        visibility 0s linear 0.6s;
    }

    .fortune-slip.visible {
      opacity: 1;
      visibility: visible;
      transform: rotate(-1.5deg) scale(1);
      transition:
        opacity 0.45s ease 0.15s,
        transform 0.45s cubic-bezier(0.34, 1.2, 0.64, 1) 0.15s,
        visibility 0s;
    }

    .fortune-slip.reroll {
      animation: slipPop 0.5s ease;
    }

    @keyframes slipPop {
      0% { transform: rotate(-1.5deg) scale(0.94); opacity: 0.4; }
      60% { transform: rotate(1deg) scale(1.02); }
      100% { transform: rotate(-1.5deg) scale(1); opacity: 1; }
    }

    .fortune-text {
      font-family: "Fraunces", serif;
      font-size: 1.05rem;
      font-style: italic;
      font-weight: 500;
      line-height: 1.45;
      color: var(--ink);
      margin-bottom: 0.75rem;
    }

    .fortune-meta {
      font-size: 0.875rem;
      font-weight: 700;
      font-style: italic;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="stage">
    <h1 class="brand">Fortune Favoured</h1>
    <p class="tagline">Crack a cookie. Get a game idea.</p>

    <div class="cookie-wrap" aria-hidden="true">
      <div class="cookie" id="cookie">
        <svg class="cookie-svg" viewBox="0 0 220 160" role="img" aria-label="Fortune cookie">
          <defs>
            <linearGradient id="cookieGold" x1="18%" y1="8%" x2="86%" y2="92%">
              <stop offset="0" stop-color="#ffe09a" />
              <stop offset="0.28" stop-color="#f0b65a" />
              <stop offset="0.62" stop-color="#c87932" />
              <stop offset="1" stop-color="#8a4918" />
            </linearGradient>
            <linearGradient id="cookieGoldReverse" x1="82%" y1="8%" x2="14%" y2="92%">
              <stop offset="0" stop-color="#ffd98c" />
              <stop offset="0.35" stop-color="#e5a24a" />
              <stop offset="1" stop-color="#8a4918" />
            </linearGradient>
            <radialGradient id="cookieGlow" cx="35%" cy="22%" r="68%">
              <stop offset="0" stop-color="#fff1c4" stop-opacity="0.95" />
              <stop offset="0.4" stop-color="#f2bf66" stop-opacity="0.42" />
              <stop offset="1" stop-color="#8b4b1c" stop-opacity="0" />
            </radialGradient>
            <linearGradient id="foldShade" x1="50%" y1="0%" x2="50%" y2="100%">
              <stop offset="0" stop-color="#6f3510" />
              <stop offset="0.45" stop-color="#a85a22" />
              <stop offset="1" stop-color="#d99240" />
            </linearGradient>
            <linearGradient id="paperSvg" x1="0" y1="0" x2="1" y2="0.35">
              <stop offset="0" stop-color="#e5d4af" />
              <stop offset="0.15" stop-color="#fff9ea" />
              <stop offset="0.85" stop-color="#f7ebcf" />
              <stop offset="1" stop-color="#d4c093" />
            </linearGradient>
            <filter id="softEdge" x="-10%" y="-10%" width="120%" height="120%">
              <feGaussianBlur in="SourceGraphic" stdDeviation="0.2" />
            </filter>
          </defs>

          <!-- Intact: classic folded crescent fortune cookie -->
          <g class="cookie-state cookie-intact">
            <ellipse cx="110" cy="136" rx="74" ry="7" fill="#3a210e" opacity="0.2" />

            <!-- Outer crescent body -->
            <path
              d="M24 88
                 C28 48 64 24 110 24
                 C156 24 192 48 196 88
                 C198 106 186 118 170 116
                 C148 113 128 98 110 72
                 C92 98 72 113 50 116
                 C34 118 22 106 24 88 Z"
              fill="url(#cookieGold)"
              stroke="#7f4316"
              stroke-width="1.6"
            />

            <!-- Top sheen -->
            <path
              d="M34 82
                 C42 52 72 36 110 36
                 C148 36 178 52 186 82
                 C170 64 146 58 126 62
                 C118 64 113 68 110 72
                 C107 68 102 64 94 62
                 C74 58 50 64 34 82 Z"
              fill="url(#cookieGlow)"
            />

            <!-- Central folded ridge (the tuck) -->
            <path
              d="M86 44
                 C96 34 105 36 110 50
                 C115 36 124 34 134 44
                 C124 58 116 78 110 102
                 C104 78 96 58 86 44 Z"
              fill="url(#foldShade)"
              opacity="0.95"
            />
            <path
              d="M92 46 C100 40 106 44 110 56 C114 44 120 40 128 46"
              fill="none"
              stroke="#ffe2a0"
              stroke-width="2.2"
              stroke-linecap="round"
              opacity="0.55"
            />

            <!-- Tip points / edge thickness -->
            <path
              d="M34 94 C48 112 72 114 92 100 M186 94 C172 112 148 114 128 100"
              fill="none"
              stroke="#6d3711"
              stroke-width="2.2"
              stroke-linecap="round"
              opacity="0.35"
            />
            <path
              d="M48 58 C56 50 68 48 78 52 M172 58 C164 50 152 48 142 52"
              fill="none"
              stroke="#ffe6ad"
              stroke-width="1.8"
              stroke-linecap="round"
              opacity="0.45"
            />
          </g>

          <!-- Broken: two crescent halves + paper slip -->
          <g class="cookie-state cookie-broken">
            <ellipse cx="110" cy="138" rx="86" ry="7" fill="#3a210e" opacity="0.2" />

            <g class="paper-emerging">
              <path
                d="M58 74
                   Q70 68 84 72
                   L162 66
                   Q168 80 163 94
                   L70 100
                   Q58 92 58 74 Z"
                fill="url(#paperSvg)"
                stroke="#c7b07c"
                stroke-width="1"
              />
              <path d="M86 82 L146 78 M90 88 L136 85" stroke="#9a7046" stroke-width="1.5" stroke-linecap="round" opacity="0.5" />
            </g>

            <g class="broken-left">
              <path
                d="M22 96
                   C24 58 54 30 96 28
                   C104 28 108 34 110 46
                   L103 58 L110 70 L100 82 L106 96
                   C90 116 70 126 50 126
                   C32 126 20 112 22 96 Z"
                fill="url(#cookieGold)"
                stroke="#7f4316"
                stroke-width="1.6"
              />
              <path
                d="M30 88 C40 58 66 42 96 40 C102 40 106 42 108 48 C86 46 54 58 30 88 Z"
                fill="url(#cookieGlow)"
              />
              <path d="M100 82 L106 96 C90 114 70 122 50 122" fill="none" stroke="#6a3310" stroke-width="2" opacity="0.4" />
            </g>

            <g class="broken-right">
              <path
                d="M198 96
                   C196 58 166 30 124 28
                   C116 28 112 34 110 46
                   L117 58 L110 70 L120 82 L114 96
                   C130 116 150 126 170 126
                   C188 126 200 112 198 96 Z"
                fill="url(#cookieGoldReverse)"
                stroke="#7f4316"
                stroke-width="1.6"
              />
              <path
                d="M190 88 C180 58 154 42 124 40 C118 40 114 42 112 48 C134 46 166 58 190 88 Z"
                fill="url(#cookieGlow)"
              />
              <path d="M120 82 L114 96 C130 114 150 122 170 122" fill="none" stroke="#6a3310" stroke-width="2" opacity="0.4" />
            </g>
          </g>
        </svg>
      </div>
    </div>

    <button type="button" class="btn" id="crackBtn">Crack Open My Fortune</button>

    <div class="fortune-area">
      <div class="fortune-slip" id="fortuneSlip" aria-live="polite">
        <p class="fortune-text" id="fortuneText"></p>
        <p class="fortune-meta" id="fortuneMeta"></p>
      </div>
    </div>
  </main>

  <script src="gameIdeas.js"></script>
  <script>
    const cookie = document.getElementById("cookie");
    const fortuneSlip = document.getElementById("fortuneSlip");
    const fortuneText = document.getElementById("fortuneText");
    const fortuneMeta = document.getElementById("fortuneMeta");
    const crackBtn = document.getElementById("crackBtn");

    function generateFortune() {
      const { idea, estimatedTime } = generateGameIdea();

      const alreadyOpen = cookie.classList.contains("cracked");

      cookie.classList.remove("shake");
      void cookie.offsetWidth;
      cookie.classList.add("shake");

      cookie.classList.add("cracked");

      fortuneText.textContent = `"${idea}"`;
      fortuneMeta.textContent = estimatedTime;

      if (alreadyOpen) {
        fortuneSlip.classList.remove("reroll");
        void fortuneSlip.offsetWidth;
        fortuneSlip.classList.add("visible", "reroll");
      } else {
        fortuneSlip.classList.add("visible");
      }
    }

    crackBtn.addEventListener("click", generateFortune);
  </script>
</body>
</html>
