<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fortune Favoured</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #3d2914;
      --bg-mid: #8b5e34;
      --bg-light: #d4a574;
      --gold: #e8b84a;
      --gold-bright: #f5d078;
      --cookie: #c47a3a;
      --cookie-dark: #8a4e1f;
      --cookie-light: #e09a55;
      --brown: #2a1a0c;
      --paper: #f7ecd4;
      --paper-edge: #e5d4b0;
      --ink: #3a2a1a;
      --muted: #6b5340;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100dvh;
      width: 100%;
      font-family: "Nunito", sans-serif;
      color: var(--brown);
      background:
        radial-gradient(ellipse 80% 60% at 50% 20%, rgba(245, 208, 120, 0.35), transparent 55%),
        radial-gradient(ellipse 70% 50% at 80% 80%, rgba(196, 122, 58, 0.4), transparent 50%),
        linear-gradient(165deg, var(--bg-light) 0%, var(--bg-mid) 45%, var(--bg-deep) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(1.25rem, 4vh, 3.5rem) clamp(1rem, 4vw, 2.5rem);
    }

    .stage {
      width: min(720px, 100%);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(1rem, 2.5vh, 2rem);
    }

    .brand {
      font-family: "Fraunces", serif;
      font-size: clamp(2.2rem, 5.5vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--brown);
      text-shadow: 0 2px 0 rgba(245, 208, 120, 0.45);
      line-height: 1.1;
    }

    .tagline {
      margin-top: clamp(-0.85rem, -1.5vh, -0.5rem);
      font-size: clamp(0.95rem, 2vw, 1.35rem);
      font-weight: 600;
      color: var(--muted);
    }

    .cookie-wrap {
      position: relative;
      width: clamp(160px, 42vw, 360px);
      aspect-ratio: 11 / 8;
      height: auto;
      margin: clamp(0.35rem, 1.5vh, 1rem) 0;
      perspective: 600px;
    }

    .cookie {
      position: relative;
      width: 100%;
      height: 100%;
      transform-origin: center center;
      transition: transform 0.15s ease;
    }

    .cookie-svg {
      display: none;
    }

    .cookie-image {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 10px 12px rgba(42, 26, 12, 0.28));
    }

    .cookie.shake {
      animation: shake 0.45s ease;
    }

    @keyframes shake {
      0%, 100% { transform: rotate(0deg) translateX(0); }
      20% { transform: rotate(-6deg) translateX(-4px); }
      40% { transform: rotate(6deg) translateX(4px); }
      60% { transform: rotate(-4deg) translateX(-2px); }
      80% { transform: rotate(3deg) translateX(2px); }
    }

    .cookie-state {
      transform-box: fill-box;
      transform-origin: center;
      transition:
        opacity 0.35s ease,
        transform 0.55s cubic-bezier(0.34, 1.2, 0.64, 1);
    }

    .cookie-intact {
      opacity: 1;
      transform: scale(1);
    }

    .cookie-broken {
      opacity: 0;
      transform: scale(0.9);
    }

    .broken-left,
    .broken-right,
    .paper-emerging {
      transform-box: fill-box;
      transform-origin: center;
      transition: transform 0.6s cubic-bezier(0.34, 1.35, 0.64, 1);
    }

    .broken-left {
      transform: translateX(12px) rotate(4deg);
    }

    .broken-right {
      transform: translateX(-12px) rotate(-4deg);
    }

    .paper-emerging {
      transform: translateY(10px) scaleX(0.75);
    }

    .cookie.cracked .cookie-intact {
      opacity: 0;
      transform: scale(0.82) rotate(-2deg);
    }

    .cookie.cracked .cookie-broken {
      opacity: 1;
      transform: scale(1);
    }

    .cookie.cracked .broken-left {
      transform: translateX(-18px) rotate(-12deg);
    }

    .cookie.cracked .broken-right {
      transform: translateX(18px) rotate(12deg);
    }

    .cookie.cracked .paper-emerging {
      transform: translateY(0) scaleX(1);
    }

    .btn {
      font-family: "Nunito", sans-serif;
      font-size: clamp(1rem, 2.1vw, 1.35rem);
      font-weight: 700;
      color: var(--brown);
      background: linear-gradient(180deg, var(--gold-bright) 0%, var(--gold) 100%);
      border: none;
      border-radius: 999px;
      padding: clamp(0.8rem, 1.8vh, 1.1rem) clamp(1.5rem, 4vw, 2.5rem);
      cursor: pointer;
      box-shadow:
        0 4px 0 #b8862a,
        0 8px 20px rgba(42, 26, 12, 0.25);
      transition: transform 0.12s ease, box-shadow 0.12s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow:
        0 6px 0 #b8862a,
        0 12px 24px rgba(42, 26, 12, 0.28);
    }

    .btn:active {
      transform: translateY(2px);
      box-shadow:
        0 2px 0 #b8862a,
        0 4px 12px rgba(42, 26, 12, 0.22);
    }

    .fortune-area {
      width: 100%;
      min-height: clamp(6.5rem, 16vh, 9rem);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .fortune-slip {
      width: 100%;
      max-width: clamp(280px, 60vw, 640px);
      padding: clamp(1rem, 2.5vh, 1.75rem) clamp(1.15rem, 3vw, 2rem);
      background:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 11px,
          rgba(180, 150, 100, 0.06) 11px,
          rgba(180, 150, 100, 0.06) 12px
        ),
        linear-gradient(135deg, #fff8e8 0%, var(--paper) 50%, var(--paper-edge) 100%);
      border: 1px solid rgba(139, 94, 52, 0.2);
      box-shadow:
        2px 3px 0 rgba(139, 94, 52, 0.08),
        0 10px 28px rgba(42, 26, 12, 0.2);
      transform: rotate(-1.5deg) scale(0.92);
      opacity: 0;
      visibility: hidden;
      transition:
        opacity 0.45s ease 0.15s,
        transform 0.45s cubic-bezier(0.34, 1.2, 0.64, 1) 0.15s,
        visibility 0s linear 0.6s;
    }

    .fortune-slip.visible {
      opacity: 1;
      visibility: visible;
      transform: rotate(-1.5deg) scale(1);
      transition:
        opacity 0.45s ease 0.15s,
        transform 0.45s cubic-bezier(0.34, 1.2, 0.64, 1) 0.15s,
        visibility 0s;
    }

    .fortune-slip.reroll {
      animation: slipPop 0.5s ease;
    }

    @keyframes slipPop {
      0% { transform: rotate(-1.5deg) scale(0.94); opacity: 0.4; }
      60% { transform: rotate(1deg) scale(1.02); }
      100% { transform: rotate(-1.5deg) scale(1); opacity: 1; }
    }

    .fortune-text {
      font-family: "Fraunces", serif;
      font-size: clamp(1rem, 2.2vw, 1.4rem);
      font-style: italic;
      font-weight: 500;
      line-height: 1.45;
      color: var(--ink);
      margin-bottom: clamp(0.55rem, 1.5vh, 0.9rem);
    }

    .fortune-meta {
      font-size: clamp(0.85rem, 1.7vw, 1.05rem);
      font-weight: 700;
      font-style: italic;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="stage">
    <h1 class="brand">Fortune Favoured</h1>
    <p class="tagline">Crack a cookie. Get a game idea.</p>

    <div class="cookie-wrap" aria-hidden="true">
      <div class="cookie" id="cookie">
        <img
          id="intact-cookie"
          class="cookie-image cookie-state cookie-intact"
          src="fortune-intact.png"
          alt=""
        />
        <img
          id="broken-cookie"
          class="cookie-image cookie-state cookie-broken"
          src="fortune-broken.png"
          alt=""
        />
        <svg class="cookie-svg" viewBox="0 0 220 160" role="img" aria-label="Fortune cookie">
          <defs>
            <linearGradient id="cookieGold" x1="12%" y1="8%" x2="88%" y2="94%">
              <stop offset="0" stop-color="#ffd986" />
              <stop offset="0.32" stop-color="#f2ad4d" />
              <stop offset="0.7" stop-color="#d27a2d" />
              <stop offset="1" stop-color="#954719" />
            </linearGradient>
            <linearGradient id="cookieFace" x1="30%" y1="0%" x2="70%" y2="100%">
              <stop offset="0" stop-color="#ffc969" />
              <stop offset="0.48" stop-color="#e9953c" />
              <stop offset="1" stop-color="#b95c20" />
            </linearGradient>
            <linearGradient id="toastedEdge" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0" stop-color="#7d3511" />
              <stop offset="0.55" stop-color="#a94f18" />
              <stop offset="1" stop-color="#dc8731" />
            </linearGradient>
            <radialGradient id="cookieGlow" cx="32%" cy="20%" r="75%">
              <stop offset="0" stop-color="#fff0bc" stop-opacity="0.78" />
              <stop offset="0.44" stop-color="#ffd47b" stop-opacity="0.2" />
              <stop offset="1" stop-color="#8d3e13" stop-opacity="0" />
            </radialGradient>
            <linearGradient id="paperSvg" x1="0" y1="0" x2="1" y2="0.5">
              <stop offset="0" stop-color="#d8c59e" />
              <stop offset="0.16" stop-color="#fff9e9" />
              <stop offset="0.84" stop-color="#f4e6c6" />
              <stop offset="1" stop-color="#cbb486" />
            </linearGradient>
            <filter id="bakedTexture" x="-8%" y="-8%" width="116%" height="116%">
              <feTurbulence type="fractalNoise" baseFrequency="0.58" numOctaves="3" seed="12" result="noise" />
              <feColorMatrix
                in="noise"
                type="matrix"
                values="0.7 0 0 0 0.2
                        0 0.45 0 0 0.08
                        0 0 0.2 0 0
                        0 0 0 0.14 0"
                result="grain"
              />
              <feBlend in="SourceGraphic" in2="grain" mode="soft-light" />
            </filter>
          </defs>

          <!-- Intact cookie: crisp folded planes with pointed outer tips -->
          <g id="legacy-intact-cookie" class="cookie-state cookie-intact">
            <ellipse cx="111" cy="139" rx="78" ry="7" fill="#3a210e" opacity="0.2" />

            <!-- Full angular shell -->
            <path
              d="M25 104
                 L31 72
                 Q38 44 63 29
                 Q86 16 106 27
                 L112 38
                 L118 27
                 Q142 18 164 34
                 Q185 51 192 80
                 L191 104
                 Q187 123 168 132
                 L151 130
                 Q127 121 111 96
                 Q94 121 68 132
                 L49 130
                 Q31 125 25 104 Z"
              fill="url(#cookieGold)"
              stroke="#873c13"
              stroke-width="2"
              stroke-linejoin="round"
              filter="url(#bakedTexture)"
            />

            <!-- Left baked plane -->
            <path
              d="M31 72
                 Q42 45 65 32
                 Q84 21 103 28
                 L111 40
                 L104 61
                 L112 78
                 L111 96
                 Q92 118 67 128
                 L49 127
                 Q34 121 28 104 Z"
              fill="url(#cookieGlow)"
            />

            <!-- Right overlapping folded plane -->
            <path
              d="M118 27
                 Q143 20 164 35
                 Q183 52 190 80
                 L190 103
                 Q185 121 167 129
                 L151 127
                 Q127 117 111 96
                 L118 78
                 L109 61
                 L116 45 Z"
              fill="url(#cookieFace)"
              stroke="#9b4515"
              stroke-width="1.7"
              stroke-linejoin="round"
              filter="url(#bakedTexture)"
            />

            <!-- Crisp center fold -->
            <path
              d="M118 29 L109 61 L118 78 L111 96"
              fill="none"
              stroke="url(#toastedEdge)"
              stroke-width="6"
              stroke-linecap="butt"
              stroke-linejoin="miter"
              opacity="0.92"
            />
            <path
              d="M116 31 L108 59"
              fill="none"
              stroke="#ffd27b"
              stroke-width="1.8"
              stroke-linecap="square"
              opacity="0.45"
            />

            <!-- Toasted lower rim and subtle baked freckles -->
            <path
              d="M111 96 Q127 121 151 130 L168 132"
              fill="none"
              stroke="#873810"
              stroke-width="3.2"
              stroke-linecap="square"
              opacity="0.58"
            />
            <g fill="#9a4617" opacity="0.24">
              <circle cx="56" cy="53" r="1.3" />
              <circle cx="78" cy="35" r="1" />
              <circle cx="46" cy="81" r="1.1" />
              <circle cx="88" cy="66" r="1.2" />
              <circle cx="158" cy="55" r="1.1" />
              <circle cx="178" cy="84" r="1.4" />
              <circle cx="137" cy="105" r="1" />
            </g>
          </g>

          <!-- Broken cookie: crescent halves with jagged break + paper slip -->
          <g id="legacy-broken-cookie" class="cookie-state cookie-broken">
            <ellipse cx="110" cy="140" rx="87" ry="7" fill="#3a210e" opacity="0.2" />

            <g class="paper-emerging">
              <path
                d="M86 76
                   C108 72 136 76 170 86
                   L162 112
                   C134 100 108 94 86 96 Z"
                fill="url(#paperSvg)"
                stroke="#bea675"
                stroke-width="1"
              />
              <path
                d="M102 84 C124 82 144 86 156 92 M100 91 C120 90 136 93 146 98"
                fill="none"
                stroke="#9a7046"
                stroke-width="1.4"
                stroke-linecap="round"
                opacity="0.5"
              />
            </g>

            <g class="broken-left">
              <path
                d="M24 105
                   L30 72
                   Q38 43 64 29
                   Q88 17 108 27
                   L116 42 L108 56 L117 68 L106 82 L114 96 L104 110
                   Q87 126 64 132
                   L46 129
                   Q30 122 24 105 Z"
                fill="url(#cookieGold)"
                stroke="#843a12"
                stroke-width="2"
                stroke-linejoin="round"
                filter="url(#bakedTexture)"
              />
              <path
                d="M30 72 Q43 44 66 32 Q87 21 104 28 L111 40 Q76 43 48 67 L29 98 Z"
                fill="url(#cookieGlow)"
              />
              <path
                d="M108 27 L116 42 L108 56 L117 68 L106 82 L114 96 L104 110"
                fill="none"
                stroke="#71300f"
                stroke-width="3.4"
                stroke-linejoin="round"
                opacity="0.82"
              />
              <path
                d="M104 110 Q87 126 64 132 L46 129"
                fill="none"
                stroke="#8a3910"
                stroke-width="2.6"
                stroke-linecap="square"
                opacity="0.5"
              />
            </g>

            <g class="broken-right">
              <path
                d="M196 103
                   L190 72
                   Q183 45 158 30
                   Q137 18 116 29
                   L109 44 L117 57 L107 70 L118 84 L109 98 L119 112
                   Q137 128 160 133
                   L177 129
                   Q192 120 196 103 Z"
                fill="url(#cookieFace)"
                stroke="#843a12"
                stroke-width="2"
                stroke-linejoin="round"
                filter="url(#bakedTexture)"
              />
              <path
                d="M117 30 Q137 21 157 33 Q179 47 188 74 L193 99 Q175 71 151 51 Q132 35 117 38 Z"
                fill="url(#cookieGlow)"
              />
              <path
                d="M116 29 L109 44 L117 57 L107 70 L118 84 L109 98 L119 112"
                fill="none"
                stroke="#71300f"
                stroke-width="3.4"
                stroke-linejoin="round"
                opacity="0.82"
              />
              <path
                d="M119 112 Q137 128 160 133 L177 129"
                fill="none"
                stroke="#8a3910"
                stroke-width="2.6"
                stroke-linecap="square"
                opacity="0.5"
              />
            </g>
          </g>
        </svg>
      </div>
    </div>

    <button type="button" class="btn" id="crackBtn">Crack Open My Fortune</button>

    <div class="fortune-area">
      <div class="fortune-slip" id="fortuneSlip" aria-live="polite">
        <p class="fortune-text" id="fortuneText"></p>
        <p class="fortune-meta" id="fortuneMeta"></p>
      </div>
    </div>
  </main>

  <script src="gameIdeas.js"></script>
  <script>
    const cookie = document.getElementById("cookie");
    const fortuneSlip = document.getElementById("fortuneSlip");
    const fortuneText = document.getElementById("fortuneText");
    const fortuneMeta = document.getElementById("fortuneMeta");
    const crackBtn = document.getElementById("crackBtn");

    function generateFortune() {
      const { idea, estimatedTime } = generateGameIdea();

      const alreadyOpen = cookie.classList.contains("cracked");

      cookie.classList.remove("shake");
      void cookie.offsetWidth;
      cookie.classList.add("shake");

      cookie.classList.add("cracked");

      fortuneText.textContent = `"${idea}"`;
      fortuneMeta.textContent = estimatedTime;

      if (alreadyOpen) {
        fortuneSlip.classList.remove("reroll");
        void fortuneSlip.offsetWidth;
        fortuneSlip.classList.add("visible", "reroll");
      } else {
        fortuneSlip.classList.add("visible");
      }
    }

    crackBtn.addEventListener("click", generateFortune);
  </script>
</body>
</html>
